name: Cleanup Docker Hub tags

on:
  workflow_dispatch:
    inputs:
      keep_tags:
        description: "Tags om te behouden (kommagescheiden; leeg = alles verwijderen)"
        required: false
        default: ""
      dry_run:
        description: "Alleen tonen wat verwijderd zou worden"
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check credentials
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          TOKEN="${DOCKER_TOKEN:-$DOCKER_PASSWORD}"
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "::error::DOCKER_USERNAME en DOCKER_TOKEN (of DOCKER_PASSWORD) zijn vereist."
            exit 1
          fi

      - name: Delete old tags
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          KEEP_TAGS: ${{ inputs.keep_tags }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          TOKEN="${DOCKER_TOKEN:-$DOCKER_PASSWORD}"
          REPO="jeffersonmouze/cargopilot"

          HUB_TOKEN=$(curl -fsS -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKER_USERNAME}\",\"password\":\"${TOKEN}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          IFS=',' read -ra KEEP <<< "${KEEP_TAGS}"
          keep_lower=""
          for t in "${KEEP[@]}"; do
            keep_lower="${keep_lower} $(echo "$t" | tr '[:upper:]' '[:lower:]' | xargs)"
          done

          deleted=0
          kept=0
          page=1
          while true; do
            RESP=$(curl -fsS "https://hub.docker.com/v2/repositories/${REPO}/tags?page_size=100&page=${page}" \
              -H "Authorization: JWT ${HUB_TOKEN}")
            COUNT=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',[])))")
            [ "$COUNT" -eq 0 ] && break

            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              tag_lc=$(echo "$tag" | tr '[:upper:]' '[:lower:]')
              if echo " ${keep_lower} " | grep -q " ${tag_lc} "; then
                echo "KEEP  ${tag}"
                kept=$((kept + 1))
                continue
              fi
              if [ "$DRY_RUN" = "true" ]; then
                echo "WOULD DELETE ${tag}"
              else
                echo "DELETE ${tag}"
                curl -fsS -X DELETE "https://hub.docker.com/v2/repositories/${REPO}/tags/${tag}/" \
                  -H "Authorization: JWT ${HUB_TOKEN}"
              fi
              deleted=$((deleted + 1))
            done < <(echo "$RESP" | python3 -c "import sys,json; [print(r['name']) for r in json.load(sys.stdin).get('results',[])]")

            NEXT=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('next') or '')")
            [ -z "$NEXT" ] && break
            page=$((page + 1))
          done

          echo "Klaar: ${deleted} tag(s) verwijderd of gemarkeerd, ${kept} behouden."
