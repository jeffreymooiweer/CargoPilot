services:
  cargopilot:
    build: .
    image: jeffreymooiweer/cargopilot:latest
    container_name: cargopilot
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
