name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release-body.md
          else
            python3 - "$VERSION" <<'PY' > release-body.md
          import re
          import sys
          from pathlib import Path

          version = sys.argv[1]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL)
          print(match.group(1).strip() if match else f"Release {version}. Zie CHANGELOG.md voor details.")
          PY
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CargoPilot ${{ github.ref_name }}
          body_path: release-body.md
          draft: false
          prerelease: false
